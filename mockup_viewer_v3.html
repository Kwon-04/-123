<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f1117;display:flex;height:100vh;overflow:hidden;

/* ── 왼쪽: 폰 목업 ── */
.left{flex:0 0 520px;display:flex;flex-direction:column;align-items:center;

.pi{width:100%;height:100%;border-radius:40px;overflow:hidden;

.notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);

.sb{position:absolute;top:0;left:0;right:0;height:48px;z-index:999;

  padding:0 22px 5px;background:rgba(255,255,255,.96);}
.st{font-size:13px;font-weight:600;color:#000;}
.ah{position:absolute;top:48px;left:0;right:0;height:58px;z-index:998;

.hb{width:32px;height:32px;border-radius:50%;background:#f2f2f7;

.hi{flex:1;}
.ht{font-size:14px;font-weight:600;color:#000;}

.r2{background:#007aff;color:#fff;}
.r3{background:#8e8e93;color:#fff;}
.si{flex:1;min-width:0;}
.sl{font-size:12px;font-weight:600;color:#000;

.sd{font-size:10px;color:#8e8e93;margin-top:1px;}

.panel-sub{font-size:12px;color:#8e8e93;}
.section-tabs{display:flex;gap:8px;padding:12px 20px;

.zone-card.active{background:#1a2540;border-color:#007aff;}
.zone-icon{width:36px;height:36px;border-radius:10px;

.zone-meta{font-size:11px;color:#8e8e93;margin-top:2px;}
.zone-badge{font-size:11px;font-weight:700;white-space:nowrap;}
.badge-green{color:#34c759;}

// ── 지도 초기화 ──
function initMap() {
  if (mapObj) { mapObj.remove(); mapObj = null; }
  mapObj = L.map('map', {zoomControl:false, attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapObj);
}

// 도보 소요 시간 (분) — 67m/min ≈ 4km/h
function walkMins(dist) { return Math.max(1, Math.ceil(dist / 67)); }

// 예상 정차 시간 (분) — 건물당 약 3.5분 (도보왕복+배달)
function parkMins(n) { return Math.ceil(n * 3.5); }

// 도로 정보 시뮬레이션 (cluster_id 기반으로 일관성 유지)
function getRoadInfo(cid, rank) {
  var s = (cid * 13 + rank * 7) % 100;
  var wArr = [3.5, 4.0, 4.5, 5.0, 6.0];
  var w = wArr[s % wArr.length];
  var oneWay = (s % 5) < 2;
  var lanes = w < 5.0 ? 1 : 2;
  return { w: w.toFixed(1), oneWay: oneWay, lanes: lanes };
}

      '<div style="flex:1"><div class="il" style="font-size:11px;font-weight:600;color:#c05621;">CCTV 단속 정보 포함</div>' +
      '<div class="id" style="font-size:10px;color:#ed8936;margin-top:1px;">2순위 위치는 단속 카메라 반경 50m 이내입니다</div>' +
      '<div style="font-size:10px;color:#5856d6;font-weight:600;margin-top:4px;">🅿 예상 정차 시간 약 '+parkMins(d.bldg_count)+'분</div></div>';
  } else {
    ib.style.cssText = 'background:#f0fff4;border:1px solid #c6f6d5;border-radius:12px;padding:10px 12px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;';
    ib.innerHTML =
      '<div><div style="font-size:11px;font-weight:600;color:#276749;">경사 보정 도보 거리 절감</div>' +
      '<div style="font-size:10px;color:#48bb78;margin-top:1px;">베이스라인 '+Math.round(d.baseline)+'m → 최적 '+d.spots[0].equiv_dist+'m · 약 '+walkMins(d.spots[0].equiv_dist)+'분</div>' +
      '<div style="font-size:10px;color:#5856d6;font-weight:600;margin-top:4px;">🅿 예상 정차 시간 약 '+parkMins(d.bldg_count)+'분</div></div>' +
      '<div style="font-size:20px;font-weight:700;color:#22543d;">▼'+d.reduction.toFixed(1)+'%</div>';
  }

  // 범례
  var leg = document.getElementById('ph-legend');
  var legHtml = '<div class="li"><div class="ld" style="background:#ff3b30;border-radius:50%"></div>1순위</div>' +
    '<div class="li"><div class="ld" style="background:#007aff;border-radius:50%"></div>2순위</div>' +
    '<div class="li"><div class="ld" style="background:#8e8e93;border-radius:50%"></div>3순위</div>' +
    '<div class="li"><div class="ld" style="background:#ff9500;border-radius:3px"></div>배송 건물</div>';
  if (d.has_any_cctv) {
    legHtml += '<div class="li"><div class="ld" style="background:rgba(255,59,48,.3);border:1px solid #ff3b30;border-radius:50%"></div>CCTV 구역</div>';
  }
  leg.innerHTML = legHtml;

  // 정차 위치 카드
  var colors = ['#ff3b30','#007aff','#8e8e93'];
  var spotsHtml = '';
  d.spots.forEach(function(s) {
    var badge2 = s.cctv
      ? '<div class="cwarn">⚠ CCTV 주의</div>'
      : '<div class="cok">✓ 단속 안전</div>';
    var ri = getRoadInfo(d.cluster_id, s.rank);
    spotsHtml += '<div class="sc">' +
      '<div class="rb r'+s.rank+'">'+s.rank+'</div>' +
      '<div class="si">' +
        '<div class="sl">'+s.road_name+'</div>' +
        '<div class="sd">등가 도보 <strong>'+s.equiv_dist+'m</strong> · 약 <strong>'+walkMins(s.equiv_dist)+'분</strong></div>' +
        '<div class="road-tag">' +
          '<span>폭 '+ri.w+'m</span>' +
          '<span>'+ri.lanes+'차로</span>' +
          '<span class="'+(ri.oneWay?'oneway':'')+'">'+(ri.oneWay?'일방통행':'양방통행')+'</span>' +
        '</div>' +
      '</div>' + badge2 + '</div>';
  });
  document.getElementById('ph-spots').innerHTML = spotsHtml;

  // 지도
  initMap();
  var allBounds = [];
  var s1 = [d.spots[0].lat, d.spots[0].lon];

  if (d.has_cctv2 && d.spots.length > 1) {
    L.circle([d.spots[1].lat, d.spots[1].lon],
      {radius:50, color:'#ff3b30', fillColor:'#ff3b30',
        fillOpacity:.2, weight:1.5, dashArray:'4,4'}).addTo(mapObj);
  }
  d.buildings.forEach(function(b) {
    L.polyline([s1,b], {color:'#ff3b30',weight:2,opacity:.5,dashArray:'5,5'}).addTo(mapObj);
  });
  d.buildings.forEach(function(b) {
    L.marker(b, {icon:bldgIcon()}).addTo(mapObj);
    allBounds.push(b);
  });
  d.spots.forEach(function(s,i) {
    L.marker([s.lat,s.lon],
      {icon:pinIcon(s.rank,colors[i]),zIndexOffset:(3-i)*100}).addTo(mapObj);
    allBounds.push([s.lat,s.lon]);
  });
  if (allBounds.length > 0) {
    // 하단 시트가 ~310px 가리므로 보이는 영역 기준으로 맞춤
    mapObj.fitBounds(L.latLngBounds(allBounds), {
      paddingTopLeft:    [20, 20],
      paddingBottomRight:[20, 310],
      maxZoom: 18
    });
  }

  // 목록 활성화 표시
  document.querySelectorAll('.zone-card').forEach(function(el) {
    el.classList.remove('active');
  });
  var el = document.getElementById('card-'+cid);
  if (el) el.classList.add('active');
}

// ── 목록 렌더 ──
function renderList(tab) {
  var ids = tab === 'improve' ? IMPROVE_IDS : CCTV_IDS;
  var html = '';
  ids.forEach(function(cid) {
    var d = ALL_DATA[String(cid)];
    if (!d) return;
    var icon  = d.has_any_cctv ? '📷' : '📍';
    var bg    = d.has_any_cctv ? '#2a1f0a' : '#0a2218';
    var badge = d.has_any_cctv
      ? '<span class="zone-badge badge-orange">CCTV ⚠</span>'
      : '<span class="zone-badge badge-green">▼'+d.reduction.toFixed(1)+'%</span>';
    html +=
      '<div class="zone-card" id="card-'+cid+'" onclick="renderPhone('+cid+')">' +
        '<div class="zone-icon" style="background:'+bg+'">'+icon+'</div>' +
        '<div class="zone-info">' +
          '<div class="zone-name">'+d.road_area+' 권역</div>' +
          '<div class="zone-meta">건물 '+d.bldg_count+'개 · 정차 3개 대안</div>' +
        '</div>' +
        badge +
      '</div>';
  });
  document.getElementById('list-area').innerHTML = html || '<div style="color:#8e8e93;padding:20px;font-size:13px;">해당 구역이 없습니다</div>';
  if (currentId) {
    var el = document.getElementById('card-'+currentId);
    if (el) el.classList.add('active');
  }
}

// ── 탭 전환 ──
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(function(b,i) {
    b.className = 'tab-btn ' + (['improve','cctv'][i]===tab ? 'active':'inactive');
  });
  renderList(tab);
}

// ── 초기화 ──
renderList('improve');
// 지도 DOM이 완전히 그려진 후 실행되도록 setTimeout
setTimeout(function() { renderPhone(99); }, 50);
</script>
</body></html>
